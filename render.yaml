services:
  - type: web
    name: contract-risk-analyzer
    runtime: python
    pythonVersion: 3.11
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run app.py --server.port 10000 --server.address 0.0.0.0
    envVars:
      - key: GEMINI_API_KEY
        scope: build
      - key: STREAMLIT_SERVER_HEADLESS
        value: true
